name: Daily Tech Radar

# 평일(KST 월~금) 한국시간 03:07에 자동 실행.
# GitHub cron은 UTC 기준 → 18:07 UTC = 03:07 KST 다음날. 따라서 KST 월~금은
# UTC 일~목(0-4)에 해당. (요일/주말 최종 판단은 main.py가 KST로 다시 확인)
# 분을 정각(:00)에서 살짝 어긋나게 둔 이유: 정각은 전 세계 cron이 몰려 대기 지연이 큼.
# 수동 실행(workflow_dispatch)도 가능 — Actions 탭에서 "Run workflow" 버튼.
on:
  schedule:
    - cron: "7 18 * * 0-4"
  workflow_dispatch: {}

permissions:
  contents: write      # 생성된 결과(output, data.js)를 저장소에 커밋
  pages: write         # GitHub Pages 배포
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 오늘의 논문 생성 (수집 → 선별 → 통역)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # 클라우드 금고에서 자동 주입
        run: python main.py

      - name: 정적 사이트 데이터 빌드
        run: python build_site.py

      - name: 결과를 저장소에 커밋 (추천 기록 = 아카이브 DB)
        run: |
          git config user.name "tech-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add output site/data.js pool.json
          git commit -m "chore: daily update ($(date -u +%Y-%m-%d))" || echo "변경 없음"
          git push

      - name: Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://eunbi-ko-0223.github.io/tech-letter/
    # GitHub Pages 배포는 가끔 "Deployment failed, try again later" 서버측 일시 오류로 죽는다.
    # (2026-07-06 이 오류로 build는 성공했는데 그날치가 사이트에 안 떴음.)
    # → 코드/데이터 문제가 아니므로 최대 3회 자동 재시도로 흡수한다. 3번 다 실패하면 잡이 진짜 실패.
    steps:
      - name: GitHub Pages 배포 (시도 1/3)
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: 30초 대기 후 재시도
        if: steps.deploy1.outcome == 'failure'
        run: sleep 30

      - name: GitHub Pages 배포 (시도 2/3)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: 60초 대기 후 재시도
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 60

      - name: GitHub Pages 배포 (시도 3/3, 최종)
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
